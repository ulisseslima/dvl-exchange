<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Earnings — dvl-exchange charts</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px}</style>
</head>
<body>
  <nav>
    <div class="nav-wrapper blue darken-2">
      <a href="/" class="brand-logo" style="padding-left:12px">dvl-exchange</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="/">Home</a></li>
      </ul>
    </div>
  </nav>
  <div class="container">
    <h4>Earnings</h4>
    <div class="card-panel">
      <div class="row">
        <div class="input-field col s3">
          <select id="earn-range" data-filter="range">
            <option value="month">Month</option>
            <option value="all">All</option>
            <option value="today">Today</option>
            <option value="week">Week</option>
            <option value="year">Year</option>
            <option value="years">N Years</option>
            <option value="months">N Months</option>
          </select>
          <label>Range</label>
        </div>
        <div class="input-field col s2"><input id="earn-year" data-filter="year" placeholder="2024"><label for="earn-year">Year / N</label></div>
        <div class="input-field col s2"><input id="earn-month" data-filter="month" placeholder="01"><label for="earn-month">Month / N</label></div>
        <div class="input-field col s2"><input id="earn-institution" data-filter="institution" placeholder="institution"><label for="earn-institution">Institution</label></div>
        <div class="input-field col s3">
          <select id="earn-source" data-filter="source">
            <option value="">All</option>
            <option value="passive-income">Passive</option>
            <option value="stable-income">Stable</option>
            <option value="extra-income">Extra</option>
            <option value="active">Active (Stable+Extra)</option>
          </select>
          <label>Source</label>
        </div>
      </div>
      <div class="row">
        <div class="col s12" id="ticker-exclude"></div>
      </div>
      <div class="row" style="margin-bottom:0">
        <div class="col s12" id="presets-panel"></div>
      </div>
      <div class="row">
        <div class="col s12"><button id="run-earn" class="btn waves-effect waves-light">Run Earnings</button></div>
      </div>
    </div>

    <div id="results"></div>
    <div style="margin-top:18px"><canvas id="chart" width="800" height="400"></canvas></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script type="module">
  import { apiPost, renderTable, drawChart, initTickerExclude, initFilterPersistence } from '/js/utils.js'

  document.addEventListener('DOMContentLoaded', async () => {
    M.FormSelect.init(document.querySelectorAll('select'))
    const { getExcluded, setExcluded } = await initTickerExclude('ticker-exclude')
    const saveFilters = initFilterPersistence('earnings', {
      getExtra: () => ({ excludeTickerIds: getExcluded() }),
      onRestore: (data) => { if (data.excludeTickerIds && data.excludeTickerIds.length) setExcluded(data.excludeTickerIds) }
    })

    document.getElementById('run-earn').addEventListener('click', async () => {
      const range = document.getElementById('earn-range').value
      const year = document.getElementById('earn-year').value
      const month = document.getElementById('earn-month').value
      const institution = document.getElementById('earn-institution').value
      const source = document.getElementById('earn-source').value

      const body = { range }
      if (year) body.year = year
      if (month) body.month = month
      if (range === 'years' && year) body.years = year
      if (range === 'months' && month) body.months = month
      if (institution) body.institution = institution
      if (source) body.source = source
      const ex = getExcluded()
      if (ex.length) body.excludeTickerIds = ex
      saveFilters()

      const j = await apiPost('/api/earnings', body)
      const cols = j.columns || []
      const rows = j.rows || []
      renderTable(document.getElementById('results'), cols, rows)

      if (cols.length > 1 && rows.length > 0) {
        const brlIdx = cols.indexOf('brl') !== -1 ? cols.indexOf('brl') : cols.indexOf('total')
        const labelIdx = cols.indexOf('institution') !== -1 ? cols.indexOf('institution') : 0
        if (brlIdx !== -1) drawChart('chart', cols, rows, labelIdx, brlIdx, 'bar')
      }
    })
  })
  </script>
</body>
</html>
