<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Products — dvl-exchange charts</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px}</style>
</head>
<body>
  <nav>
    <div class="nav-wrapper blue darken-2">
      <a href="/" class="brand-logo" style="padding-left:12px">dvl-exchange</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="/">Home</a></li>
      </ul>
    </div>
  </nav>
  <div class="container">
    <h4>Products</h4>
    <div class="card-panel">
      <div class="row">
        <div class="input-field col s3">
          <select id="prod-range">
            <option value="month">Month</option>
            <option value="all">All</option>
            <option value="today">Today</option>
            <option value="week">Week</option>
            <option value="year">Year</option>
          </select>
          <label>Range</label>
        </div>
        <div class="input-field col s2"><input id="prod-year" placeholder="2024"><label for="prod-year">Year</label></div>
        <div class="input-field col s2"><input id="prod-name" placeholder="product"><label for="prod-name">Name</label></div>
        <div class="input-field col s2"><input id="prod-store" placeholder="store"><label for="prod-store">Store</label></div>
        <div class="input-field col s2"><input id="prod-category" placeholder="category"><label for="prod-category">Category</label></div>
      </div>
      <div class="row">
        <div class="input-field col s2"><input id="prod-brand" placeholder="brand"><label for="prod-brand">Brand</label></div>
        <div class="input-field col s2"><input id="prod-tags" placeholder="tags"><label for="prod-tags">Tags</label></div>
        <div class="input-field col s2"><input id="prod-like" placeholder="fuzzy search"><label for="prod-like">Like</label></div>
        <div class="input-field col s2">
          <select id="prod-group">
            <option value="">Default (product)</option>
            <option value="store">Store</option>
            <option value="ops">Ops</option>
          </select>
          <label>Group By</label>
        </div>
        <div class="input-field col s2">
          <select id="prod-order">
            <option value="total_spent desc">Total Spent</option>
            <option value="total_amount desc">Total Amount</option>
            <option value="avg_unit_price desc">Avg Price</option>
            <option value="buys desc">Buys</option>
          </select>
          <label>Order</label>
        </div>
        <div class="col s1" style="display:flex;align-items:center;padding-top:14px">
          <label><input type="checkbox" id="prod-sim" /><span>Sim</span></label>
        </div>
      </div>
      <div class="row">
        <div class="col s12" id="ticker-exclude"></div>
      </div>
      <div class="row">
        <div class="col s12"><button id="run-prod" class="btn waves-effect waves-light">Run Products</button></div>
      </div>
    </div>

    <div id="results"></div>
    <div style="margin-top:18px"><canvas id="chart" width="800" height="400"></canvas></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script type="module">
  import { apiPost, renderTable, drawChart, initTickerExclude } from '/js/utils.js'

  document.addEventListener('DOMContentLoaded', async () => {
    M.FormSelect.init(document.querySelectorAll('select'))
    const getExcluded = await initTickerExclude('ticker-exclude')

    document.getElementById('run-prod').addEventListener('click', async () => {
      const range = document.getElementById('prod-range').value
      const year = document.getElementById('prod-year').value
      const name = document.getElementById('prod-name').value
      const store = document.getElementById('prod-store').value
      const category = document.getElementById('prod-category').value
      const brand = document.getElementById('prod-brand').value
      const tags = document.getElementById('prod-tags').value
      const like = document.getElementById('prod-like').value
      const groupBy = document.getElementById('prod-group').value
      const orderBy = document.getElementById('prod-order').value
      const simulation = document.getElementById('prod-sim').checked

      const body = { range }
      if (year) body.year = year
      if (name) body.name = name
      if (store) body.store = store
      if (category) body.category = category
      if (brand) body.brand = brand
      if (tags) body.tags = tags
      if (like) body.like = like
      if (groupBy) body.groupBy = groupBy
      if (orderBy) body.orderBy = orderBy
      if (simulation) body.simulation = true
      const ex = getExcluded()
      if (ex.length) body.excludeTickerIds = ex

      const j = await apiPost('/api/products', body)
      const cols = j.columns || []
      const rows = j.rows || []
      renderTable(document.getElementById('results'), cols, rows)

      if (cols.length > 1 && rows.length > 0) {
        const spentIdx = cols.indexOf('total_spent') !== -1 ? cols.indexOf('total_spent') : cols.length - 4
        const labelIdx = cols.indexOf('product') !== -1 ? cols.indexOf('product') : 0
        if (spentIdx > 0) drawChart('chart', cols, rows, labelIdx, spentIdx, 'bar')
      }
    })
  })
  </script>
</body>
</html>
