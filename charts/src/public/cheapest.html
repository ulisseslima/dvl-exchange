<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cheapest — dvl-exchange charts</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:16px}</style>
</head>
<body>
  <nav>
    <div class="nav-wrapper blue darken-2">
      <a href="/" class="brand-logo" style="padding-left:12px">dvl-exchange</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="/">Home</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h4>Cheapest</h4>
    <div class="card-panel">
      <div class="row">
        <div class="input-field col s4">
          <select id="cheap-range"><option value="month">Month</option><option value="all">All</option><option value="today">Today</option><option value="week">Week</option><option value="year">Year</option></select>
          <label>Range</label>
        </div>
        <div class="input-field col s3">
            <select id="cheap-currency"><option value="">All</option></select>
            <label>Currency</label>
          </div>
        <div class="input-field col s2" style="display:flex;align-items:center">
          <label><input type="checkbox" id="cheap-short" /><span>Short</span></label>
        </div>
        <div class="col s3" style="display:flex;align-items:center">
          <button id="run-cheap" class="btn waves-effect waves-light">Run Cheapest</button>
        </div>
      </div>
      <div class="row">
        <div class="col s6">
          <label>Chart column: <select id="cheap-col"></select></label>
        </div>
        <div class="col s4">
          <label>Type: <select id="cheap-chart-type"><option>bar</option><option>line</option></select></label>
        </div>
      </div>
      <div class="row">
        <div class="col s12" id="ticker-exclude"></div>
      </div>
    </div>

    <!-- Primary chart (single-column) placed before the results -->
    <div style="margin-top:18px">
      <canvas id="chart" width="800" height="400"></canvas>
    </div>

    <!-- Secondary multi-column chart controls -->
    <div class="card-panel" style="margin-top:12px">
      <div class="row">
        <div class="col s8">
          <div id="multi-cols" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        </div>
        <div class="col s4">
          <label>Multi chart type: <select id="cheap-multi-type"><option value="line">line</option><option value="bar">bar</option></select></label>
        </div>
      </div>
    </div>

    <div id="results"></div>

    <div style="margin-top:18px">
      <canvas id="chart-multi" width="800" height="400"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="/js/app.js"></script>
  <script type="module" src="/js/cheapest.js"></script>
</body>
</html>
